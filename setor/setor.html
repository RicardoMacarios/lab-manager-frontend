<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Manager | Setor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="setor.css">
</head>
<body class="bg-[#e8f5e9] text-[#1b5e20] antialiased min-h-screen p-6">

    <div class="max-w-2xl mx-auto">

        <!-- Botão voltar -->
        <button onclick="history.back()" class="text-[10px] tracking-widest text-[#2e7d32] mb-8 uppercase flex items-center gap-2 hover:text-[#1b5e20] transition-all cursor-pointer">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7" stroke-width="2"/>
            </svg>
            Voltar
        </button>

        <!-- Header -->
        <header class="mb-6">
            <p id="label-tipo" class="text-[#388e3c] font-mono text-[9px] tracking-[0.3em] uppercase mb-1">Tipo: —</p>
            <h1 id="titulo-setor" class="text-2xl font-light text-[#1b5e20] uppercase tracking-widest mb-1">—</h1>
            <div class="h-[1px] w-12 bg-[#4caf50] mt-2"></div>
        </header>

        <!-- Painel de resumo -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="stat-card">
                <p class="stat-label">Total</p>
                <p id="stat-total" class="stat-value text-[#1b5e20]">—</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Entregues</p>
                <p id="stat-entregues" class="stat-value text-yellow-700">—</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">No estoque</p>
                <p id="stat-faltam" class="stat-value text-[#2e7d32]">—</p>
            </div>
        </div>

        <!-- Busca + Botão cadastrar -->
        <div class="flex items-center gap-3 mb-6">
            <div class="relative flex-1">
                <svg class="w-3 h-3 absolute left-3 top-1/2 -translate-y-1/2 text-[#4caf50] pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7" stroke-width="1.5"/>
                    <path d="M16.5 16.5l4 4" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input id="campo-busca" type="text" placeholder="Buscar por nome, marca, polegada..." class="form-input pl-8 w-full" autocomplete="off">
            </div>
            <button id="btn-cadastrar" class="shrink-0 text-[10px] tracking-widest uppercase border border-[#388e3c] text-[#1b5e20] px-4 py-2 hover:bg-[#a5d6a7] transition-all flex items-center gap-2 cursor-pointer">
                <span class="text-sm leading-none font-light">+</span>
                Cadastrar
            </button>
        </div>

        <!-- Lista de válvulas -->
        <div id="lista-valvulas" class="grid grid-cols-1 gap-3"></div>

    </div>


    <!-- ===== MODAL: CADASTRO ===== -->
    <div id="modal-cadastro" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-light uppercase tracking-widest text-[#1b5e20]">Nova Válvula</h2>
                <button id="btn-fechar-cadastro" class="text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/>
                    </svg>
                </button>
            </div>
            <form id="form-cadastro" class="space-y-4">
                <div>
                    <label class="form-label">Nome *</label>
                    <input id="cad-nome" type="text" class="form-input" placeholder="Ex: VB-01" autocomplete="off">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="form-label">Marca</label>
                        <input id="cad-marca" type="text" class="form-input" placeholder="Ex: Ebro">
                    </div>
                    <div>
                        <label class="form-label">Polegada</label>
                        <input id="cad-polegada" type="text" class="form-input" placeholder='Ex: 2"'>
                    </div>
                </div>
                <div>
                    <label class="form-label">Status</label>
                    <select id="cad-status" class="form-input">
                        <option>Normal</option>
                        <option>Manutenção</option>
                        <option>Inativa</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Observações</label>
                    <textarea id="cad-observacoes" class="form-input" placeholder="Opcional..."></textarea>
                </div>
                <p id="erro-cadastro" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" class="w-full text-[10px] tracking-widest uppercase border border-[#388e3c] text-[#1b5e20] py-2.5 hover:bg-[#a5d6a7] transition-all cursor-pointer">
                    Salvar
                </button>
            </form>
        </div>
    </div>


    <!-- ===== MODAL: EDIÇÃO ===== -->
    <div id="modal-edicao" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-light uppercase tracking-widest text-[#1b5e20]">Editar Válvula</h2>
                <button id="btn-fechar-edicao" class="text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/>
                    </svg>
                </button>
            </div>
            <form id="form-edicao" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="form-label">Status</label>
                    <select id="edit-status" class="form-input">
                        <option>Normal</option>
                        <option>Manutenção</option>
                        <option>Inativa</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Observações</label>
                    <textarea id="edit-observacoes" class="form-input" placeholder="Opcional..."></textarea>
                </div>
                <p id="erro-edicao" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" class="w-full text-[10px] tracking-widest uppercase border border-[#388e3c] text-[#1b5e20] py-2.5 hover:bg-[#a5d6a7] transition-all cursor-pointer">
                    Salvar Alterações
                </button>
            </form>
        </div>
    </div>


    <!-- ===== MODAL: RETIRADA COM ASSINATURA ===== -->
    <div id="modal-retirada" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-light uppercase tracking-widest text-[#1b5e20]">Registrar Retirada</h2>
                <button id="btn-fechar-retirada" class="text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/>
                    </svg>
                </button>
            </div>
            <form id="form-retirada" class="space-y-4">
                <input type="hidden" id="retirada-id">
                <div>
                    <label class="form-label">Nome de quem está retirando *</label>
                    <input id="retirada-nome" type="text" class="form-input" placeholder="Nome completo" autocomplete="off">
                </div>
                <div>
                    <label class="form-label">Assinatura *</label>
                    <div class="canvas-container">
                        <canvas id="canvas-assinatura"></canvas>
                    </div>
                    <button type="button" id="btn-limpar-canvas" class="mt-1.5 text-[9px] tracking-widest uppercase text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                        ↺ Limpar
                    </button>
                </div>
                <p id="erro-retirada" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" class="w-full text-[10px] tracking-widest uppercase border border-yellow-600 text-yellow-700 py-2.5 hover:bg-yellow-100 transition-all cursor-pointer">
                    Confirmar Retirada
                </button>
            </form>
        </div>
    </div>


    <!-- ===== MODAL: VISUALIZAR ASSINATURA ===== -->
    <div id="modal-assinatura" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-light uppercase tracking-widest text-[#1b5e20]">Assinatura</h2>
                <button id="btn-fechar-assinatura" class="text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/>
                    </svg>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <p class="form-label">Retirada por</p>
                    <p id="assin-nome" class="text-[#1b5e20] text-sm tracking-wider"></p>
                </div>
                <div>
                    <p class="form-label">Data / Hora</p>
                    <p id="assin-data" class="text-[#2e7d32] text-xs tracking-wider"></p>
                </div>
                <div>
                    <p class="form-label mb-2">Assinatura</p>
                    <img id="assin-img" src="" alt="Assinatura">
                </div>
            </div>
        </div>
    </div>


    <script type="module" src="setor.js"></script>
</body>
</html>
