<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Manager | Setores Esfera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="esfera.css">
</head>
<body class="text-slate-300 p-6 antialiased bg-[#020617]">

    <button onclick="voltar()" class="text-[10px] tracking-widest text-emerald-500 mb-8 uppercase flex items-center gap-2 hover:text-emerald-400 transition-all cursor-pointer">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"/></svg>
        Voltar ao Início
    </button>

    <header class="mb-10">
        <p class="text-emerald-500 font-mono text-[9px] tracking-[0.3em] uppercase mb-1">Tipo: Esfera</p>
        <h1 class="text-2xl font-light text-white uppercase tracking-widest mb-2">Selecione o Setor</h1>
        <div class="h-[1px] w-12 bg-emerald-500"></div>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl">
        <button class="menu-item" onclick="abrirSetor('Fermentação')">
            <span>Fermentação</span>
            <span class="icon">→</span>
        </button>
        <button class="menu-item" onclick="abrirSetor('Massa A')">
            <span>Massa A</span>
            <span class="icon">→</span>
        </button>
        <button class="menu-item" onclick="abrirSetor('Massa B')">
            <span>Massa B</span>
            <span class="icon">→</span>
        </button>
        <button class="menu-item" onclick="abrirSetor('TRCA')">
            <span>TRCA</span>
            <span class="icon">→</span>
        </button>
        <button class="menu-item" onclick="abrirSetor('Moenda')">
            <span>Moenda</span>
            <span class="icon">→</span>
        </button>
    </div>

    <script src="esfera.js"></script>
</body>
</html>
