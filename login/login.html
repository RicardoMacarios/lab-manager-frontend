<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Laboratório Alta Mogiana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <header>
            <h1>Alta Mogiana</h1>
            <p>Sistema de Gestão de Valvulas</p>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="exemplo@gmail.com" required>
                <span class="error-msg" id="emailError">O e-mail deve ser @gmail.com</span>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                <span class="error-msg" id="passError">A senha deve ter mais de 6 dígitos</span>
            </div>

            <button type="submit" id="btnLogin">Entrar</button>
        </form>

        <div class="link-cadastro">
            Não tem uma conta? <a href="../cadastro/cadastro.html">Cadastre-se aqui</a>
        </div>
        
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
