<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Manager | Sedes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="sedes.css">
</head>
<body class="text-[#1b5e20] p-6 antialiased bg-[#e8f5e9]">

    <button onclick="voltar()" class="text-[10px] tracking-widest text-[#2e7d32] mb-8 uppercase flex items-center gap-2 hover:text-[#1b5e20] transition-all cursor-pointer">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"/></svg>
        Voltar ao Início
    </button>

    <header class="mb-8">
        <p class="text-[#388e3c] font-mono text-[9px] tracking-[0.3em] uppercase mb-1">Estoque de Sedes</p>
        <h1 id="titulo-marca" class="text-2xl font-light text-[#1b5e20] uppercase tracking-widest mb-1">—</h1>
        <div class="h-[1px] w-12 bg-[#4caf50] mt-2"></div>
    </header>

    <!-- Barra de ações -->
    <div class="flex items-center gap-3 mb-6 flex-wrap max-w-2xl">
        <div class="relative flex-1 min-w-[140px]">
            <svg class="w-3 h-3 absolute left-3 top-1/2 -translate-y-1/2 text-[#4caf50] pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7" stroke-width="1.5"/>
                <path d="M16.5 16.5l4 4" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="campo-busca" type="text" placeholder="Buscar por polegada..." class="w-full pl-8 pr-3 py-2 bg-[#c8e6c9] border border-[#66bb6a] text-[#1b5e20] text-xs tracking-wide placeholder:text-[#81c784] focus:outline-none focus:border-[#388e3c]" autocomplete="off">
        </div>
        <button id="btn-cadastrar" class="shrink-0 text-[10px] tracking-widest uppercase border border-[#388e3c] text-[#1b5e20] px-4 py-2 hover:bg-[#a5d6a7] transition-all flex items-center gap-2 cursor-pointer">
            <span class="text-sm leading-none font-light">+</span>
            Cadastrar
        </button>
    </div>

    <!-- Lista -->
    <div id="lista-sedes" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl"></div>


    <!-- ===== MODAL: CADASTRO ===== -->
    <div id="modal-cadastro" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="bg-[#e8f5e9] border border-[#a5d6a7] p-6 w-full max-w-sm mx-4">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-light uppercase tracking-widest text-[#1b5e20]">Nova Sede</h2>
                <button id="btn-fechar-cadastro" class="text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/></svg>
                </button>
            </div>
            <form id="form-cadastro" class="space-y-4">
                <div>
                    <label class="block text-[9px] tracking-[0.15em] uppercase text-[#388e3c] mb-1">Polegada *</label>
                    <input id="cad-polegada" type="text" class="w-full px-3 py-2 bg-[#c8e6c9] border border-[#66bb6a] text-[#1b5e20] text-xs tracking-wide placeholder:text-[#81c784] focus:outline-none focus:border-[#388e3c]" placeholder='Ex: 2"' autocomplete="off">
                </div>
                <div>
                    <label class="block text-[9px] tracking-[0.15em] uppercase text-[#388e3c] mb-1">Quantidade inicial *</label>
                    <input id="cad-quantidade" type="number" min="0" class="w-full px-3 py-2 bg-[#c8e6c9] border border-[#66bb6a] text-[#1b5e20] text-xs tracking-wide placeholder:text-[#81c784] focus:outline-none focus:border-[#388e3c]" placeholder="0">
                </div>
                <p id="erro-cadastro" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" class="w-full text-[10px] tracking-widest uppercase border border-[#388e3c] text-[#1b5e20] py-2.5 hover:bg-[#a5d6a7] transition-all cursor-pointer">
                    Salvar
                </button>
            </form>
        </div>
    </div>


    <!-- ===== MODAL: ENTRADA / SAÍDA DE ESTOQUE ===== -->
    <div id="modal-edicao" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="bg-[#e8f5e9] border border-[#a5d6a7] p-6 w-full max-w-sm mx-4">
            <div class="flex items-center justify-between mb-6">
                <h2 id="edit-titulo" class="text-sm font-light uppercase tracking-widest text-[#1b5e20]">Estoque</h2>
                <button id="btn-fechar-edicao" class="text-[#4caf50] hover:text-[#1b5e20] transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/></svg>
                </button>
            </div>
            <form id="form-edicao" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="edit-modo">
                <div class="pb-3 border-b border-[#a5d6a7]">
                    <p class="text-[9px] tracking-[0.15em] uppercase text-[#388e3c]">Sede</p>
                    <p id="edit-nome-sede" class="text-[#1b5e20] text-sm tracking-widest font-medium uppercase mt-0.5"></p>
                </div>
                <div>
                    <p class="text-[9px] tracking-[0.15em] uppercase text-[#388e3c]">Quantidade atual</p>
                    <p id="edit-qtd-atual" class="text-[#1b5e20] text-lg font-light tracking-widest mt-0.5"></p>
                </div>
                <div>
                    <label id="edit-label" class="block text-[9px] tracking-[0.15em] uppercase text-[#388e3c] mb-1">Quantidade *</label>
                    <input id="edit-quantidade" type="number" min="1" class="w-full px-3 py-2 bg-[#c8e6c9] border border-[#66bb6a] text-[#1b5e20] text-xs tracking-wide placeholder:text-[#81c784] focus:outline-none focus:border-[#388e3c]" placeholder="Ex: 10">
                </div>
                <p id="erro-edicao" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" id="edit-btn-submit" class="w-full text-[10px] tracking-widest uppercase border border-[#388e3c] text-[#1b5e20] py-2.5 hover:bg-[#a5d6a7] transition-all cursor-pointer">
                    Confirmar
                </button>
            </form>
        </div>
    </div>


    <script type="module" src="sedes.js"></script>
</body>
</html>
