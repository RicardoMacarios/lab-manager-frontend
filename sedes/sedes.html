<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Manager | Sedes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="sedes.css">
</head>
<body>

    <!-- ── TOPBAR ─────────────────────────────────────────── -->
    <div class="topbar">
        <a href="../dashboard/inicio.html?secao=sedes" class="btn-voltar" title="Voltar ao início">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
            </svg>
            Voltar ao início
        </a>
        <span class="topbar-badge" id="label-marca">Marca: —</span>
    </div>

    <!-- ── CONTEÚDO PRINCIPAL ────────────────────────────── -->
    <div class="main-content">

        <!-- Breadcrumb -->
        <nav class="breadcrumb" aria-label="Navegação">
            <a href="../dashboard/inicio.html?secao=sedes">Início</a>
            <span class="breadcrumb-sep">›</span>
            <span>Estoque</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-atual" id="bread-marca">—</span>
        </nav>

        <!-- Label + Título + Cadastrar -->
        <p class="secao-label">Estoque de sedes</p>
        <div class="secao-header">
            <h1 class="secao-titulo" id="titulo-marca">—</h1>
            <button id="btn-cadastrar" class="btn-cadastrar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Cadastrar sede
            </button>
        </div>

        <!-- Barra de resumo -->
        <div class="resumo-bar">
            <div class="resumo-item">
                <span class="resumo-label">Total de sedes</span>
                <span class="resumo-valor" id="stat-total-sedes">—</span>
            </div>
            <div class="resumo-divider"></div>
            <div class="resumo-item">
                <span class="resumo-label">Total em estoque</span>
                <span class="resumo-valor cor-estoque" id="stat-total-estoque">—</span>
            </div>
            <div class="resumo-divider"></div>
            <div class="resumo-item">
                <span class="resumo-label">Estoque crítico</span>
                <span class="resumo-valor cor-critico" id="stat-critico">—</span>
            </div>
        </div>

        <!-- Busca -->
        <div class="input-busca-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="7"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input
                id="campo-busca"
                type="search"
                class="input-busca"
                placeholder="Buscar por polegada..."
                autocomplete="off"
                aria-label="Buscar por polegada"
            >
        </div>

        <!-- Grid de cards -->
        <div id="lista-sedes" class="sedes-grid"></div>

    </div>


    <!-- ===== MODAL: CADASTRO ===== -->
    <div id="modal-cadastro" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h2 class="modal-titulo">Nova Sede</h2>
                <button id="btn-fechar-cadastro" class="modal-btn-fechar">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/></svg>
                </button>
            </div>
            <form id="form-cadastro" class="space-y-4">
                <div>
                    <label class="form-label">Polegada *</label>
                    <input id="cad-polegada" type="text" class="form-input" placeholder='Ex: 2"' autocomplete="off">
                </div>
                <div>
                    <label class="form-label">Quantidade inicial *</label>
                    <input id="cad-quantidade" type="number" min="0" class="form-input" placeholder="0">
                </div>
                <p id="erro-cadastro" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" class="modal-btn-submit">Salvar</button>
            </form>
        </div>
    </div>


    <!-- ===== MODAL: ENTRADA / SAÍDA ===== -->
    <div id="modal-edicao" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h2 id="edit-titulo" class="modal-titulo">Estoque</h2>
                <button id="btn-fechar-edicao" class="modal-btn-fechar">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="1.5"/></svg>
                </button>
            </div>
            <form id="form-edicao" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="edit-modo">
                <div class="pb-3 border-b border-[#c8e6c9]">
                    <p class="form-label">Sede</p>
                    <p id="edit-nome-sede" class="text-[#1a5c32] text-sm font-bold tracking-widest uppercase mt-0.5" style="font-family:'Merriweather',serif"></p>
                </div>
                <div>
                    <p class="form-label">Quantidade atual</p>
                    <p id="edit-qtd-atual" class="text-[#1a5c32] text-2xl font-bold mt-0.5" style="font-family:'Merriweather',serif"></p>
                </div>
                <div>
                    <label id="edit-label" class="form-label">Quantidade *</label>
                    <input id="edit-quantidade" type="number" min="1" class="form-input" placeholder="Ex: 10">
                </div>
                <p id="erro-edicao" class="text-red-700 text-[11px] min-h-[1rem]"></p>
                <button type="submit" id="edit-btn-submit" class="modal-btn-submit">Confirmar</button>
            </form>
        </div>
    </div>


    <script type="module" src="sedes.js"></script>
</body>
</html>
