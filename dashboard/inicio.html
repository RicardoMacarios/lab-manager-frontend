<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Manager | Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="inicio.css">
</head>
<body class="bg-[#e8f5e9] text-[#1b5e20] font-sans antialiased">

    <div id="launcher-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <header class="text-center mb-16">
            <p class="text-[#388e3c] font-mono text-[10px] tracking-[0.3em] uppercase mb-2">Gerenciamento de Válvulas</p>
            <h1 class="text-2xl font-light text-[#1b5e20] tracking-widest uppercase">Selecione o Ativo</h1>
            <div class="h-[1px] w-12 bg-[#4caf50] mx-auto mt-3"></div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">

            <button onclick="openDashboard('Esfera')" class="valve-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <circle cx="12" cy="12" r="8"/>
                    <path d="M12 4v16M4 12h16"/>
                </svg>
                <span>Esfera</span>
            </button>

            <button onclick="openDashboard('Borboleta')" class="valve-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <circle cx="12" cy="12" r="8"/>
                    <ellipse cx="12" cy="12" rx="2" ry="6"/>
                </svg>
                <span>Borboleta</span>
            </button>

        </div>
    </div>

    <script src="inicio.js"></script>
</body>
</html>
