<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Alta Mogiana</title>
    <link rel="stylesheet" href="../login/style.css">
</head>
<body>
    <div class="card-cadastro">
        <header>
            <h1>Alta Mogiana</h1>
            <p>Crie sua conta de acesso</p>
        </header>

        <form id="formCadastro">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>
            <div class="input-group">
                <label for="emailCad">E-mail</label>
                <input type="email" id="emailCad" placeholder="exemplo@gmail.com" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="input-group">
                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha" placeholder="Repita a senha" required>
            </div>
            <button type="submit">Finalizar Cadastro</button>
        </form>

        <div class="link-login">
            Já tem uma conta? <a href="../login/login.html">Faça login aqui</a>
        </div>
    </div>
    <script type="module" src="cadastro.js"></script>
</body>
</html>
